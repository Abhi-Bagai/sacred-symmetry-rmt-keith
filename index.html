<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="meta-title"></title>
  <meta name="description" id="meta-description" content="">
  <!-- Open Graph -->
  <meta property="og:title" id="meta-og-title" content="">
  <meta property="og:description" id="meta-og-description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yoursite.com">
  <meta property="og:image" content="https://yoursite.com/assets/og-image.jpg">
  <meta property="og:locale" content="en_CA">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Announcement bar -->
  <aside class="announcement" aria-label="Announcement">
    <p data-msg="announcement.text"></p>
  </aside>

  <!-- Header / Navigation -->
  <header class="header" id="header">
    <div class="header-inner container">
      <a href="#home" class="logo" data-msg-aria-label="header.logoAriaLabel">
        <img src="assets/logo_navbar.png" alt="" class="logo-img" aria-hidden="true">
      </a>
      <h1 class="navbar-title" data-msg="header.navbarTitle"></h1>
      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="main-nav" data-msg-aria-label="header.navToggleAriaLabel">
        <span class="hamburger"></span>
      </button>
      <nav class="nav" id="main-nav" data-msg-aria-label="header.mainNavAriaLabel" aria-label="">
        <ul class="nav-list">
          <li><a href="#home" class="nav-link" data-msg="header.nav.home"></a></li>
          <li><a href="#about" class="nav-link" data-msg="header.nav.about"></a></li>
          <li><a href="#services" class="nav-link" data-msg="header.nav.services"></a></li>
          <li><a href="#faq" class="nav-link" data-msg="header.nav.faq"></a></li>
          <li><a href="#contact" class="nav-link" data-msg="header.nav.contact"></a></li>
          <li><a href="#" class="btn btn-primary nav-cta" data-msg="header.nav.bookNow"></a></li>
          <li>
            <div class="lang-toggle-pill" id="lang-toggle" role="group" aria-label="Language">
              <button type="button" class="lang-toggle-option" data-locale="en" aria-pressed="false" aria-label="English"><span class="lang-code">EN</span></button>
              <button type="button" class="lang-toggle-option" data-locale="fr" aria-pressed="false" aria-label="Français"><span class="lang-code">FR</span></button>
            </div>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section class="hero" id="home" aria-labelledby="hero-heading">
      <div class="hero-inner container">
        <div class="hero-content">
          <img src="assets/logo.png" alt="" class="hero-content-logo" aria-hidden="true">
          <h1 id="hero-heading" data-msg="hero.heading"></h1>
          <p class="hero-lead" data-msg="hero.lead"></p>
          <div class="hero-ctas">
            <a href="#" class="btn btn-primary btn-lg" data-msg="hero.bookNow"></a>
            <a href="#services" class="btn btn-secondary btn-lg" data-msg="hero.viewServices"></a>
          </div>
          <p class="hero-trust" data-msg="hero.trust"></p>
        </div>
        <div class="hero-visual" aria-hidden="true">
          <div class="hero-image-placeholder">
            <img src="assets/Chase_landscape.jpg" alt="Hero image" aria-hidden="true">
          </div>
        </div>
      </div>
    </section>

    <!-- About Section -->
    <section class="about section" id="about" aria-labelledby="about-heading">
      <div class="container about-inner">
        <div class="about-content">
          <h2 id="about-heading" data-msg="about.heading"></h2>
          <div class="about-headshot-placeholder" aria-hidden="true">
            <span data-msg="about.headshotPlaceholder"></span>
            <img src="assets/logo.png" alt="Headshot of Keith" aria-hidden="true">
          </div>
          <div class="about-text">
            <p data-msg="about.paragraph1"></p>
            <p data-msg="about.paragraph2"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- Services Section -->
    <section class="services section" id="services" aria-labelledby="services-heading">
      <div class="container">
        <h2 id="services-heading" data-msg="services.heading"></h2>
        <p class="section-intro" data-msg="services.intro"></p>
        <div class="service-cards">
          <article class="service-card">
            <h3 data-msg="services.card45.title"></h3>
            <p data-msg="services.card45.description"></p>
            <p class="service-price" data-msg="services.card45.price"></p>
            <a href="#" class="btn btn-primary" data-msg="services.card45.bookNow"></a>
          </article>
          <article class="service-card">
            <h3 data-msg="services.card60.title"></h3>
            <p data-msg="services.card60.description"></p>
            <p class="service-price" data-msg="services.card60.price"></p>
            <a href="#" class="btn btn-primary" data-msg="services.card60.bookNow"></a>
          </article>
        </div>
      </div>
    </section>

    <!-- Benefits Section -->
    <section class="benefits section" id="benefits" aria-labelledby="benefits-heading">
      <div class="container">
        <h2 id="benefits-heading" data-msg="benefits.heading"></h2>
        <div class="benefit-cards">
          <article class="benefit-card">
            <h3 data-msg="benefits.professionalCare.title"></h3>
            <p data-msg="benefits.professionalCare.description"></p>
          </article>
          <article class="benefit-card">
            <h3 data-msg="benefits.traumaInformed.title"></h3>
            <p data-msg="benefits.traumaInformed.description"></p>
          </article>
          <article class="benefit-card">
            <h3 data-msg="benefits.personalizedTreatment.title"></h3>
            <p data-msg="benefits.personalizedTreatment.description"></p>
          </article>
          <article class="benefit-card">
            <h3 data-msg="benefits.calmEnvironment.title"></h3>
            <p data-msg="benefits.calmEnvironment.description"></p>
          </article>
        </div>
      </div>
    </section>

    <!-- FAQ / Policies Section -->
    <section class="faq section" id="faq" aria-labelledby="faq-heading">
      <div class="container">
        <h2 id="faq-heading" data-msg="faq.heading"></h2>
        <div class="faq-list" role="list">
          <div class="faq-item" role="listitem">
            <h3>
              <button class="faq-trigger" id="faq-1" aria-expanded="false" aria-controls="faq-answer-1" data-faq-toggle data-msg="faq.items.0.question">
              </button>
            </h3>
            <div class="faq-content" id="faq-answer-1" role="region" aria-labelledby="faq-1" hidden>
              <p data-msg="faq.items.0.answer"></p>
            </div>
          </div>
          <div class="faq-item" role="listitem">
            <h3>
              <button class="faq-trigger" id="faq-2" aria-expanded="false" aria-controls="faq-answer-2" data-faq-toggle data-msg="faq.items.1.question">
              </button>
            </h3>
            <div class="faq-content" id="faq-answer-2" role="region" aria-labelledby="faq-2" hidden>
              <p data-msg="faq.items.1.answer"></p>
            </div>
          </div>
          <div class="faq-item" role="listitem">
            <h3>
              <button class="faq-trigger" id="faq-3" aria-expanded="false" aria-controls="faq-answer-3" data-faq-toggle data-msg="faq.items.2.question">
              </button>
            </h3>
            <div class="faq-content" id="faq-answer-3" role="region" aria-labelledby="faq-3" hidden>
              <p data-msg="faq.items.2.answer"></p>
            </div>
          </div>
          <div class="faq-item" role="listitem">
            <h3>
              <button class="faq-trigger" id="faq-4" aria-expanded="false" aria-controls="faq-answer-4" data-faq-toggle data-msg="faq.items.3.question">
              </button>
            </h3>
            <div class="faq-content" id="faq-answer-4" role="region" aria-labelledby="faq-4" hidden>
              <p data-msg="faq.items.3.answer"></p>
            </div>
          </div>
          <div class="faq-item" role="listitem">
            <h3>
              <button class="faq-trigger" id="faq-5" aria-expanded="false" aria-controls="faq-answer-5" data-faq-toggle data-msg="faq.items.4.question">
              </button>
            </h3>
            <div class="faq-content" id="faq-answer-5" role="region" aria-labelledby="faq-5" hidden>
              <p data-msg="faq.items.4.answer"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section class="contact section" id="contact" aria-labelledby="contact-heading">
      <div class="container contact-inner">
        <h2 id="contact-heading" data-msg="contact.heading"></h2>
        <div class="contact-grid">
          <div class="contact-info">
            <p class="contact-name" data-msg="contact.name"></p>
            <p data-msg="contact.addressLine1"></p>
            <p data-msg="contact.location"></p>
            <p><a href="tel:+1234567890" data-msg="contact.phone"></a> <span class="contact-phone-note" data-msg="contact.phoneNote"></span></p>
            <p><a href="mailto:hello@example.com" data-msg="contact.email"></a></p>
            <p class="contact-hours"><strong data-msg="contact.hoursLabel"></strong><br><span data-msg="contact.hoursWeekday"></span><br><span data-msg="contact.hoursSaturday"></span></p>
            <a href="#" class="btn btn-primary" data-msg="contact.bookNow">Book Now</a>
          </div>
          <div class="map-placeholder">
            <iframe
              class="map-embed"
              src="https://www.google.com/maps?q=934B+Thompson+Ave,+Chase,+BC,+Canada&z=15&output=embed"
              title="Map showing Sacred Symmetry Massage Therapy location"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <a
              href="https://www.google.com/maps/search/?api=1&query=934B+Thompson+Ave,+Chase,+BC,+Canada"
              target="_blank"
              rel="noopener noreferrer"
              class="map-placeholder-link"
              aria-label="Open location in Google Maps"
            ></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-name" data-msg="footer.name"></p>
      <nav class="footer-nav" aria-label="Footer navigation">
        <ul>
          <li><a href="#home" data-msg="footer.nav.home"></a></li>
          <li><a href="#about" data-msg="footer.nav.about"></a></li>
          <li><a href="#services" data-msg="footer.nav.services"></a></li>
          <li><a href="#faq" data-msg="footer.nav.faq"></a></li>
          <li><a href="#contact" data-msg="footer.nav.contact"></a></li>
          <li><a href="#" data-msg="footer.nav.bookNow"></a></li>
        </ul>
      </nav>
      <p class="footer-jane" data-msg="footer.jane"></p>
      <p class="footer-copy" data-msg="footer.copyright" data-msg-replace-year="true"></p>
    </div>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
